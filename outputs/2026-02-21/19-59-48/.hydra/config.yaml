optim:
  _target_: verl.workers.config.FSDPOptimizerConfig
  optimizer: AdamW
  optimizer_impl: torch.optim
  lr: 1.0e-05
  lr_warmup_steps_ratio: 0.1
  total_training_steps: -1
  weight_decay: 0.01
  lr_warmup_steps: -1
  betas:
  - 0.9
  - 0.95
  clip_grad: 1.0
  min_lr_ratio: 0.0
  num_cycles: 0.5
  lr_scheduler_type: constant
  warmup_style: null
  override_optimizer_config: null
  lr_scheduler: cosine
data:
  train_batch_size: 32
  micro_batch_size: null
  micro_batch_size_per_gpu: 4
  train_files: /gpfs/radev/project/cohan/ax46/coarse-to-fine/data/sft_dataset/train.parquet
  val_files: ~/data/gsm8k/test.parquet
  train_max_samples: -1
  val_max_samples: -1
  prompt_key: prompt
  response_key: response
  prompt_dict_keys: null
  response_dict_keys: null
  multiturn:
    enable: false
    messages_key: messages
    tools_key: tools
    enable_thinking_key: enable_thinking
  max_length: 64
  truncation: error
  balance_dp_token: false
  chat_template: null
  custom_cls:
    path: null
    name: null
  use_shm: false
  apply_chat_template_kwargs: {}
model:
  partial_pretrain: Qwen/Qwen3-4B
  use_shm: false
  fsdp_config:
    model_dtype: fp32
    wrap_policy:
      min_num_params: 0
    cpu_offload: false
    offload_params: false
  external_lib: null
  enable_gradient_checkpointing: true
  trust_remote_code: false
  lora_rank: 0
  lora_alpha: 16
  target_modules: all-linear
  use_liger: false
  strategy: fsdp2
ulysses_sequence_parallel_size: 1
use_remove_padding: false
trainer:
  default_local_dir: /gpfs/radev/project/cohan/ax46/coarse-to-fine/checkpoints/sft
  default_hdfs_dir: null
  project_name: gsm8k-sft
  experiment_name: test
  total_epochs: 3
  total_training_steps: null
  logger:
  - console
  - wandb
  seed: 1
  save_freq: -1
  test_freq: -1
  nnodes: 1
  n_gpus_per_node: 1
  max_ckpt_to_keep: null
  resume_mode: auto
  resume_from_path: null
  checkpoint:
    save_contents:
    - model
    - optimizer
    - extra
    load_contents: ${trainer.checkpoint.save_contents}
  device: cuda
