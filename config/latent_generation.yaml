# Latent Generation Experiment
# Defaults live in src/config.py — only overrides belong here.
# word_count_constraints and text_word_count are derived from scale_lengths.

scale_lengths: [2, 4, 8, 16, 32]  # [z_4, z_3, z_2, z_1, text]

wandb:
  group: "latent-generation"
  tags: ["qwen3-4b"]

# Step 00 output: data splits in data_dir (8 chunks on HPC)
dataset:
  data_dir: "data/tinystoriesv2_shuffled"
  dataset_name: "tinystoriesv2"

# Step 01 → 02 → 03: batch API pipeline
# sft.prompt_data must match the output path from step 01.
# Update this after running step 01.
sft:
  prompt_data: "data/prompt_data/gpt-5-nano-2025-08-07/docs_0000100000/gemini-3-pro-7/latent-generation/sft.jsonl"
  micro_batch_size_per_gpu: 32   # was 16 — H200 headroom
  train_batch_size: 128          # was 64 — 4 grad-accum steps

# Step 05: generate from chunks 0-3 (use remaining 4-7 for held-out eval)
generation:
  model_path: "checkpoints/sft/checkpoint-1172"
  chunks: [0]

# Step 07: RL checkpoints
rl:
  sft_rl:
    model_path: "checkpoints/sft/checkpoint-1172"
    ppo_micro_batch_size_per_gpu: 16
    train_batch_size: 128
    rollout_n: 8
  c2f_finetune:
    model_path: "checkpoints/decoder"
  joint:
    model_path: "checkpoints/sft/checkpoint-1172"
    c2f_model_path: "checkpoints/decoder"
    c2f_lr: 1.0e-4
    c2f_mask_type: "causal"
    train_batch_size: 256
    c2f_save_steps: 10000
    ppo_micro_batch_size_per_gpu: 32
    c2f_micro_batch_size: 64

num_gpus: 1

c2f_training:
  fsdp: ""
  hidden_size: 512
  intermediate_size: 2048
  num_attention_heads: 8
  num_key_value_heads: 8
  head_dim: 64
  num_hidden_layers: 8
  per_device_batch_size: 256
  gradient_accumulation_steps: 1
  tokenizer_dir: "checkpoints/decoder_causal/tokenizer"

# Step 6b: no-latents AR baseline. Architecture and optimization are matched
# to c2f_training so 09_eval_nll.py can directly compare nats/word.
ar_training:
  fsdp: ""
  hidden_size: 512
  intermediate_size: 2048
  num_attention_heads: 8
  num_key_value_heads: 8
  head_dim: 64
  num_hidden_layers: 8
  per_device_batch_size: 256
  gradient_accumulation_steps: 1

# Step 6c: MDLM-style masked-diffusion baseline. Same arch, same data.
# [UNK] from the c2f tokenizer doubles as the MASK index — vocab parity
# with c2f / ar checkpoints is preserved.
diffusion_training:
  fsdp: ""
  hidden_size: 512
  intermediate_size: 2048
  num_attention_heads: 8
  num_key_value_heads: 8
  head_dim: 64
  num_hidden_layers: 8
  per_device_batch_size: 256
  gradient_accumulation_steps: 1
