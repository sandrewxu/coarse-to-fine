# Latent Generation Experiment
# Defaults live in src/config.py — only overrides belong here.
# word_count_constraints and text_word_count are derived from scale_lengths.

scale_lengths: [2, 4, 8, 16, 32]  # [z_4, z_3, z_2, z_1, text]

wandb:
  group: "latent-generation"
  tags: ["qwen3-4b"]

# Step 00 output: data splits in data_dir
dataset:
  data_dir: "data/tinystoriesv2_shuffled"
  dataset_name: "tinystoriesv2"

# Step 01 → 02 → 03: batch API pipeline
# sft.prompt_data must match the output path from step 01 (01_create_batch_requests.py).
# The path includes the doc count, which depends on the prompt_split file size.
# Update this after running step 01.
sft:
  prompt_data: "data/prompt_data/gpt-5-nano-2025-08-07/docs_0000100000/gemini-3-pro-7/latent-generation/sft.jsonl"

# Steps 05, 07: SFT checkpoint (set after running step 04)
generation:
  model_path: "checkpoints/sft/global_step_292/huggingface"

rl:
  sft_rl:
    model_path: "checkpoints/sft/global_step_292/huggingface"
  c2f_finetune:
    model_path: "checkpoints/decoder"
