# H100 (80 GB) — step 6 causal decoder, step 7 joint RL with causal mask.
# Tuned for 2× H100 SXM (NV6 NVLink). FSDP shards the actor across both GPUs,
# vLLM rollout runs DP=2 TP=1 (two replicas, no cross-GPU comm during generation).
# On 1× H100 add ++actor_rollout_ref.actor.fsdp_config.cpu_offload=true and set
# num_gpus: 1 (rollout falls back to TP=1 DP=1 automatically).
scale_lengths: [2, 4, 8, 16, 32]

wandb:
  group: "latent-generation"
  tags: ["qwen3-4b", "h100", "causal"]

dataset:
  data_dir: "data/tinystoriesv2_shuffled"
  dataset_name: "tinystoriesv2"

sft:
  prompt_data: "data/prompt_data/gpt-5-nano-2025-08-07/docs_0000100000/gemini-3-pro-7/latent-generation/sft.jsonl"

generation:
  model_path: "checkpoints/sft/checkpoint-1172"
  chunks: [0]

rl:
  sft_rl:
    model_path: "checkpoints/sft/checkpoint-1172"
  c2f_finetune:
    model_path: "checkpoints/decoder_causal"
  joint:
    model_path: "checkpoints/sft/checkpoint-1172"
    c2f_model_path: "checkpoints/decoder_causal"
    c2f_mask_type: "causal"
    c2f_lr: 1.0e-4
    checkpoint_dir: "checkpoints/rl/joint_causal"
    c2f_save_dir: "checkpoints/rl/joint_causal/c2f"
    train_batch_size: 256
    ppo_micro_batch_size_per_gpu: 32
    c2f_micro_batch_size: 256
    epochs: 1
    # DP=2 rollout: two independent vLLM replicas, one per GPU. For 4B models
    # this beats TP=2 because TP all-reduces dominate per-layer compute.
    rollout_tensor_parallel_size: 2
    # Per-GPU KV cache: each H100 holds one vLLM replica (~8 GB weights) plus
    # an FSDP actor shard (~8 GB). 0.5 × 80 ≈ 40 GB KV — ample for 512-token seqs.
    rollout_gpu_memory_utilization: 0.35
    rollout_max_num_seqs: 128

num_gpus: 2

c2f_training:
  fsdp: ""
  hidden_size: 512
  intermediate_size: 2048
  num_attention_heads: 8
  num_key_value_heads: 8
  head_dim: 64
  num_hidden_layers: 8
  mask_type: "causal"
  checkpoint_dir: "checkpoints/decoder_causal"
  tokenizer_dir: "checkpoints/tokenizer"
  per_device_batch_size: 256
  gradient_accumulation_steps: 1

# Step 6b: no-latents AR baseline. Architecture matched to c2f_training so
# scripts/09_eval_nll.py can directly compare nats/word against decoder_causal.
ar_training:
  fsdp: ""
  hidden_size: 512
  intermediate_size: 2048
  num_attention_heads: 8
  num_key_value_heads: 8
  head_dim: 64
  num_hidden_layers: 8
  checkpoint_dir: "checkpoints/ar_baseline"
  per_device_batch_size: 256
  gradient_accumulation_steps: 1

# Step 6c: MDLM-style masked-diffusion baseline. Architecture matched to
# c2f_training. Reuses [UNK] from the c2f tokenizer as the MASK index.
diffusion_training:
  fsdp: ""
  hidden_size: 512
  intermediate_size: 2048
  num_attention_heads: 8
  num_key_value_heads: 8
  head_dim: 64
  num_hidden_layers: 8
  checkpoint_dir: "checkpoints/diffusion_baseline"
  per_device_batch_size: 256
  gradient_accumulation_steps: 1
