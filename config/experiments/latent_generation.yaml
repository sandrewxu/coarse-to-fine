# Latent Generation Experiment Configuration
# Defines coarse-to-fine latent layer structure and validation constraints

# ── Weights & Biases ─────────────────────────────────────────────────────
# WANDB_API_KEY, WANDB_ENTITY, WANDB_PROJECT are loaded from .env via load_env().
# Set project/entity to null to use those env values; set them here to override.
wandb:
  enabled: true                      # set false to disable logging
  project: null                      # from .env WANDB_PROJECT (e.g. diffusion-rl)
  entity: null                       # from .env WANDB_ENTITY (e.g. andrew-xu)
  group: "latent-generation"         # groups related runs together
  tags: ["qwen3-4b"]
  mode: "online"                     # "online", "offline", or "disabled"

# ── Model architecture (matches C2FConfig) ───────────────────────────────
scale_lengths: [2, 4, 8, 16, 32]  # [z_4, z_3, z_2, z_1, text_scale]

# Word count constraints for verification (exact counts)
# These correspond to the latent layers (not including the final text scale)
word_count_constraints:
  z_4: 2   # Coarsest layer - 2 words
  z_3: 4   # Second layer - 4 words
  z_2: 8   # Third layer - 8 words
  z_1: 16  # Finest layer - 16 words

# Text scale word count (the original document)
text_word_count: 32

# Verification settings
verification:
  strict_word_count: true  # Require exact word count match
  allow_extra_whitespace: true  # Normalize whitespace when counting
  check_layer_order: true  # Ensure z_4, z_3, z_2, z_1 order

# Dataset output settings
dataset:
  output_dir: "data/verified/latent_generation_10k_v1"

# SFT with veRL (Supervised Fine-Tuning)
sft:
  model: "Qwen/Qwen3-4B"  # Base model; change to use a different model
  num_gpus: 1  # 1, 2, 3, or 4 GPUs per node
  dataset_dir: "data/sft_dataset"
  checkpoint_dir: "checkpoints/sft"
  prompt_data: "data/prompt_data/gpt-5-nano-2025-08-07/docs_0000010000/gemini-3-pro-7/latent-generation/sft.jsonl"
  # Optional training overrides (used by 04_sft_train when building veRL config)
  max_length: 256
  model_dtype: bf16
  micro_batch_size_per_gpu: 16
  use_remove_padding: true
  use_liger: true
  train_batch_size: 64
  epochs: 2
  lr: 1.0e-5

# Step 5: Local generation with vLLM
generation:
  model_path: "checkpoints/sft/sft_backup_3epoch/huggingface"  # SFT checkpoint path or HF model name
  prompt_dataset: "data/sft_dataset/train.parquet"  # Parquet with prompt column
  output_dir: "data/local_generations"
  num_gpus: 1  # vLLM tensor parallelism (1-4)
  max_tokens: 256
  temperature: 0.7
  top_p: 0.9
  top_k: -1  # -1 = disabled
  repetition_penalty: 1.0
  seed: 42
  verify_outputs: true  # Run RuleBasedVerifier on outputs

# Step 6: C2F joint model pretraining
c2f_training:
  init_from: "random"  # SFT checkpoint, base model name, or "random"
  dataset_dir: "data/sft_dataset"  # Directory with training parquet
  dataset_format: "sft"  # "c2f" for flat text (c2f_train.parquet), "sft" for prompt+response (train.parquet)
  tokenizer: "space"  # "space" = word-level (1 word = 1 token), "model" = BPE from init_from
  tokenizer_dir: "checkpoints/decoder/tokenizer"  # where the space tokenizer is saved / loaded
  checkpoint_dir: "checkpoints/decoder"
  num_gpus: 1  # 1-4 GPUs via FSDP
  per_device_batch_size: 8
  gradient_accumulation_steps: 4
  epochs: 10
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  eval_split: 0.05  # Fraction of data for validation
  fsdp: "full_shard"  # "full_shard", "shard_grad_op", or "" for DDP
  fsdp_config:
    backward_prefetch: "backward_pre"
    forward_prefetch: true
  report_to: "none"  # "wandb" or "none"
  run_name: "c2f-pretrain"
  seed: 42

# Step 7: ELBO Optimisation — GRPO on q_φ / Supervised on p_θ
rl:
  # Phase A: GRPO on q_φ (SFT model), p_θ (C2F) frozen
  # Reward = log p_θ(x, z) / num_tokens  +  format_bonus
  sft_rl:
    model_path: "checkpoints/sft/sft_backup_3epoch/huggingface"  # q_φ start checkpoint
    c2f_model_path: "checkpoints/decoder"                        # frozen p_θ (reward)
    num_gpus: 1
    dataset_dir: "data/rl_dataset"
    checkpoint_dir: "checkpoints/rl/sft"
    rollout_n: 8                    # GRPO group size (samples per prompt)
    max_prompt_length: 64
    max_response_length: 256
    train_batch_size: 64
    temperature: 1.0
    lr: 1.0e-6
    kl_coef: 0.01                  # KL penalty coefficient for actor loss
    format_bonus_weight: 0.1       # bonus when all 4 layers have correct word count
    epochs: 1

  # Phase B: Supervised fine-tuning of p_θ (C2F model), q_φ (SFT) frozen
  # Gradient: E_{q_φ}[∇_θ log p_θ(x, z)]
  c2f_finetune:
    model_path: "checkpoints/decoder"         # p_θ start checkpoint
    sft_model_path: "checkpoints/rl/sft"      # frozen q_φ (generates z samples)
    dataset_dir: "data/rl_dataset"
    generation_output_dir: "data/rl_dataset/c2f_finetune"
    checkpoint_dir: "checkpoints/rl/c2f"
    num_gpus: 1
    num_samples: null               # null = all prompts from sft train parquet
    per_device_batch_size: 8
    gradient_accumulation_steps: 4
    lr: 5.0e-5
    epochs: 3
    fsdp: "full_shard"
